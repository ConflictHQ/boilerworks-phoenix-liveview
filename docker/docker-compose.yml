services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: boilerworks
      POSTGRES_PASSWORD: boilerworks
      POSTGRES_DB: boilerworks_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U boilerworks"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8000:4000"
    environment:
      DATABASE_URL: ecto://boilerworks:boilerworks@db:5432/boilerworks_dev
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY_BASE: "dev-only-secret-key-base-that-is-at-least-64-bytes-long-for-phoenix-sessions-ok"
      PHX_HOST: localhost
      PHX_SERVER: "true"
      MIX_ENV: dev
      FEATURE_FORMS: "true"
      FEATURE_WORKFLOWS: "true"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../app:/app
      - mix_deps:/app/deps
      - mix_build:/app/_build
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  db_test:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: boilerworks
      POSTGRES_PASSWORD: boilerworks
      POSTGRES_DB: boilerworks_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U boilerworks"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
  mix_deps:
  mix_build:
